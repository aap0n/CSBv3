<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06080b">
<title>Carleton Schedule Builder — Fall 2026</title>
<style>
:root{
  --bg:#06080b; --panel:#080b0f; --panel2:#0b0f15; --border:rgba(255,255,255,.1);
  --text:#d8d8d8; --muted:rgba(216,216,216,.45); --accent:rgba(255,255,255,.7); --accent2:#ffffff;
  --open:#34d399; --closed:#f87171; --wait:#fbbf24;
  --glass:rgba(6,8,11,.82);
  --radius:0px;
  font-size:14px;
}
[data-theme="light"]{
  --bg:#f5f5f2; --panel:#f7f7f4; --panel2:#efefe9; --border:rgba(0,0,0,.14);
  --text:#1a1a1a; --muted:rgba(26,26,26,.5); --accent:rgba(0,0,0,.65); --accent2:#000000;
  --glass:rgba(245,245,242,.85);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  letter-spacing:.04em;
  display:flex; flex-direction:column; overflow:hidden;
}
header{
  display:flex; align-items:center; gap:14px; padding:10px 18px;
  background:var(--panel); border-bottom:1px solid var(--border);
  flex:0 0 auto;
}
header .logo{
  width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#7c3aed);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;
}
header h1{font-size:1.05rem;font-weight:700;letter-spacing:.2px}
header .term{
  font-size:.75rem;color:var(--muted);background:var(--panel2);
  padding:4px 10px;border-radius:20px;border:1px solid var(--border);
}
header .spacer{flex:1}
.stat{
  display:flex;flex-direction:column;align-items:center;padding:2px 12px;
  border-right:1px solid var(--border);
}
.stat:last-of-type{border-right:none}
.stat b{font-size:1.05rem}
.stat span{font-size:.62rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.iconbtn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  border-radius:9px;padding:7px 12px;cursor:pointer;font-size:.8rem;font-weight:600;
  transition:all .15s;
}
.iconbtn:hover{border-color:var(--accent);color:var(--accent2)}
main{flex:1;display:flex;min-height:0}
/* ============ LEFT: SEARCH ============ */
#left{
  width:378px; min-width:300px; flex:0 0 auto; display:flex; flex-direction:column;
  background:var(--panel); border-right:1px solid var(--border);
}
#searchWrap{padding:12px 14px 8px}
#searchBox{
  width:100%; padding:11px 14px; border-radius:11px;
  background:var(--panel2); border:1px solid var(--border); color:var(--text);
  font-size:.95rem; outline:none; transition:border .15s;
}
#searchBox:focus{border-color:var(--accent)}
#filters{display:flex;gap:6px;padding:8px 14px;flex-wrap:wrap}
.chip{
  font-size:.7rem;font-weight:600;padding:5px 11px;border-radius:20px;cursor:pointer;
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  transition:all .15s;user-select:none;
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
#results{flex:1;overflow-y:auto;padding:4px 10px 20px}
#results::-webkit-scrollbar,#sidebar ::-webkit-scrollbar{width:8px}
#results::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.course{
  border:1px solid var(--border); border-radius:var(--radius);
  margin:7px 4px; background:var(--panel2); overflow:hidden;
  transition:border-color .15s;
}
.course.expanded{border-color:var(--accent)}
.courseHead{
  display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;
}
.courseHead:hover{background:rgba(255,255,255,.03)}
.courseHead .code{font-weight:700;font-size:.92rem;white-space:nowrap}
.courseHead .title{font-size:.78rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.courseHead .n{font-size:.68rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.courseHead .caret{color:var(--muted);font-size:.7rem;transition:transform .2s}
.course.expanded .caret{transform:rotate(90deg)}
.sections{display:none;border-top:1px solid var(--border)}
.course.expanded .sections{display:block}
.sec{
  display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .12s;position:relative;
}
.sec:last-child{border-bottom:none}
.sec:hover{background:rgba(224,50,46,.08)}
.sec.selected{background:rgba(52,211,153,.10)}
.sec.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--open)}
.sec .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.dot.open{background:var(--open)} .dot.closed{background:var(--closed)} .dot.wait{background:var(--wait)}
.sec .sid{font-weight:700;font-size:.82rem;width:34px}
.sec .meta{flex:1;min-width:0}
.sec .meta .l1{font-size:.76rem;font-weight:600}
.sec .meta .l2{font-size:.7rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec .addbtn{
  font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--panel);color:var(--muted);flex:0 0 auto;
}
.sec:hover .addbtn{border-color:var(--accent);color:var(--accent2)}
.sec.selected .addbtn{border-color:var(--open);color:var(--open)}
.sec.conflict .addbtn{border-color:var(--closed);color:var(--closed)}
.badge{font-size:.62rem;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.badge.conflict{background:rgba(248,113,113,.15);color:var(--closed)}
.empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:.85rem;line-height:1.6}
/* ============ CENTER: CALENDAR ============ */
#center{flex:1;display:flex;flex-direction:column;min-width:0;padding:14px}
#calWrap{
  flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  display:flex;flex-direction:column;overflow:hidden;
}
#calHead{display:grid;border-bottom:1px solid var(--border);flex:0 0 auto}
#calHead div{
  text-align:center;padding:9px 0;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  border-left:1px solid var(--border);
}
#calHead div:first-child{border-left:none}
#calBody{flex:1;position:relative;overflow-y:auto}
#calGrid{position:relative;display:grid;min-height:100%}
.gcol{border-left:1px solid var(--border);position:relative}
.gcol:first-child{border-left:none}
.hline{position:absolute;left:0;right:0;border-top:1px solid var(--border);opacity:.5;pointer-events:none}
.hlabel{
  position:absolute;font-size:.62rem;color:var(--muted);
  transform:translateY(-50%);left:6px;background:transparent;
}
.block{
  position:absolute;border-radius:9px;padding:5px 7px;overflow:hidden;
  font-size:.68rem;line-height:1.25;cursor:pointer;border:1px solid;
  transition:top .2s ease-out, height .2s ease-out, left .2s ease-out, width .2s ease-out,
    transform .18s ease-out, box-shadow .12s, opacity .2s ease-out,
    background-color .2s, border-color .2s, color .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.block.entering,.block.leaving{opacity:0;transform:scale(.92)}
.block.tiny .bt{display:none}
.block:hover{transform:scale(1.02);z-index:30!important;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.block b{font-size:.72rem;display:block}
.block .bt{opacity:.85}
.block.ghost{
  opacity:.78;border-style:dashed;border-width:2px;
  animation:pulse 1.2s ease-in-out .3s infinite;z-index:25;
  box-shadow:0 0 0 3px rgba(224,50,46,.15), 0 6px 20px rgba(0,0,0,.35);
}
.block.ghost.entering,.block.ghost.leaving{animation:none}
.block.ghostConflict{outline:2px solid var(--closed)}
@keyframes pulse{0%,100%{opacity:.82}50%{opacity:.55}}
.block .x{
  position:absolute;top:3px;right:5px;font-size:.75rem;opacity:0;transition:opacity .12s;
  font-weight:800;
}
.block:hover .x{opacity:.9}
/* ============ RIGHT: SEMESTER ============ */
#sidebar{
  width:280px;flex:0 0 auto;display:flex;flex-direction:column;
  background:var(--panel);border-left:1px solid var(--border);
}
#sidebar h2{
  font-size:.72rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);
  padding:14px 16px 8px;
}
#selList{flex:1;overflow-y:auto;padding:0 12px}
.selItem{
  border:1px solid var(--border);border-left-width:4px;border-radius:10px;
  padding:9px 11px;margin-bottom:8px;background:var(--panel2);position:relative;
}
.selItem .c{font-weight:700;font-size:.84rem}
.selItem .t{font-size:.72rem;color:var(--muted);margin:1px 0 3px}
.selItem .m{font-size:.68rem;color:var(--muted)}
.selItem .crn{font-size:.65rem;color:var(--muted);opacity:.8}
.selItem .rm{
  position:absolute;top:7px;right:9px;cursor:pointer;color:var(--muted);
  font-weight:800;font-size:.85rem;
}
.selItem .rm:hover{color:var(--closed)}
#sumBox{border-top:1px solid var(--border);padding:12px 16px}
#sumBox .row{display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;color:var(--muted)}
#sumBox .row b{color:var(--text)}
#exportBtns{display:flex;gap:8px;padding:0 16px 16px}
#exportBtns button{flex:1}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:10px 20px;border-radius:12px;font-size:.82rem;z-index:99;
  transition:transform .25s;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.warnbar{
  background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.4);color:var(--wait);
  font-size:.72rem;padding:7px 12px;border-radius:10px;margin:0 14px 6px;display:none;
}
@media(max-width:1100px){#sidebar{display:none}}
/* ============ WEEK NAV ============ */
#calNav{display:flex;align-items:center;gap:8px;padding:2px 4px 12px;flex:0 0 auto}
#wkLabel{font-size:1.02rem;font-weight:700;letter-spacing:-.2px}
#wkLabel small{color:var(--muted);font-weight:600;font-size:.8em}
#calNav .spacer{flex:1}
.navbtn{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:6px 12px;cursor:pointer;font-size:.9rem;font-weight:700;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.navbtn:hover{border-color:var(--accent);color:var(--accent2)}
.navbtn:disabled{opacity:.35;pointer-events:none}
#calHead div small{display:block;font-size:.86em;font-weight:600;opacity:.7;text-transform:none;letter-spacing:.2px;margin-top:1px}
#calHead div.today{color:var(--accent2)}
.noWeek{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;pointer-events:none}
/* ============ MOBILE — Apple-style ============ */
#tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;
  padding:7px 10px calc(7px + env(safe-area-inset-bottom));
  background:var(--glass);
  -webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid var(--border);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-size:.64rem;font-weight:600;letter-spacing:.2px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;padding:2px 0;
}
.tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--accent2)}
@media(max-width:820px){
  :root{--radius:16px}
  #tabbar{display:flex}
  header{
    padding:10px 14px;gap:10px;
    background:var(--glass);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  }
  header .term,header .stat{display:none}
  header h1{font-size:1.15rem;letter-spacing:-.3px}
  main{padding-bottom:calc(56px + env(safe-area-inset-bottom))}
  #left,#sidebar{width:100%;min-width:0;border:none}
  #sidebar{display:flex}
  #center{padding:10px 12px 0}
  body[data-view="cal"] #left,body[data-view="cal"] #sidebar{display:none}
  body[data-view="search"] #center,body[data-view="search"] #sidebar{display:none}
  body[data-view="plan"] #left,body[data-view="plan"] #center{display:none}
  #searchBox{font-size:16px;padding:13px 16px;border-radius:14px}
  .sec{padding:12px 13px}
  .chip{padding:7px 13px;font-size:.74rem}
  .course{border-radius:16px}
  .toast{bottom:calc(74px + env(safe-area-inset-bottom))}
}
/* ============ TERM PICKER / LOAD OVERLAY / CAL ANIMATION ============ */
#termSel{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:6px 10px;font-size:.8rem;font-weight:600;cursor:pointer;
}
#termSel:hover{border-color:var(--accent)}
#loadOverlay{
  position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:var(--bg);transition:opacity .25s;
}
#loadOverlay.hide{opacity:0;pointer-events:none}
.lo-box{text-align:center;color:var(--muted);font-size:.9rem;line-height:1.7;max-width:420px;padding:0 20px}
.lo-box code{background:var(--panel2);padding:2px 7px;border-radius:6px;font-size:.85em}
.lo-spin{
  width:30px;height:30px;margin:0 auto 14px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--accent);
  animation:lospin .8s linear infinite;
}
@keyframes lospin{to{transform:rotate(360deg)}}
#staticLayer{position:absolute;inset:0;display:grid}
#blockLayer{position:absolute;inset:0;pointer-events:none;z-index:5}
#blockLayer .block{pointer-events:auto}
.nowline{position:absolute;height:0;border-top:2px solid var(--closed);z-index:20;pointer-events:none}
.nowline span{position:absolute;left:-4px;top:-5px;width:8px;height:8px;border-radius:50%;background:var(--closed)}
#calGrid{transition:height .2s ease-out}
#calGrid.slideL{animation:calInL .24s ease-out}
#calGrid.slideR{animation:calInR .24s ease-out}
@keyframes calInL{from{transform:translateX(26px);opacity:0}to{transform:none;opacity:1}}
@keyframes calInR{from{transform:translateX(-26px);opacity:0}to{transform:none;opacity:1}}
.calOut{position:absolute;left:0;right:0;pointer-events:none;z-index:4;overflow:hidden}
.calOutL{animation:calOutL .24s ease-out forwards}
.calOutR{animation:calOutR .24s ease-out forwards}
@keyframes calOutL{to{transform:translateX(-26px);opacity:0}}
@keyframes calOutR{to{transform:translateX(26px);opacity:0}}
@media (prefers-reduced-motion: reduce){
  .block,#calGrid,.toast,.navbtn,.sec{transition:none!important}
  .block.ghost,#calGrid.slideL,#calGrid.slideR,.calOut{animation:none!important}
  .block.entering,.block.leaving{opacity:1;transform:none}
  .block.ghost{opacity:.78}
  .block.leaving{opacity:0}
}
/* ============ CYBER MINIMAL SKIN ============ */
*{border-radius:0!important}
.lo-spin{border-radius:50%!important}
/* outer hairline frame (desktop) */
@media(min-width:821px){
  body{padding:14px}
  header{border:1px solid var(--border)}
  main{border:1px solid var(--border);border-top:none}
}
/* header */
header{background:transparent}
header .logo{
  background:transparent;border:1px solid var(--accent);color:var(--text);
  font-weight:600;font-size:13px;letter-spacing:.1em;
}
header h1{font-weight:600;text-transform:uppercase;letter-spacing:.18em;font-size:.92rem;white-space:nowrap}
header h1::before{content:'// ';opacity:.45}
header .term{background:transparent;text-transform:uppercase;letter-spacing:.06em}
.stat b{font-weight:600}
/* chrome text: uppercase, tracked */
.iconbtn,.navbtn,.chip,#termSel,.sec .addbtn,.tab,#exportBtns button{
  text-transform:uppercase;letter-spacing:.1em;font-weight:500;
  font-family:inherit;background:transparent;
}
.chip.on{background:var(--text);border-color:var(--text);color:var(--bg)}
.sec:hover{background:rgba(255,255,255,.04)}
.courseHead .n{background:transparent;border:1px solid var(--border)}
.course{background:transparent}
#searchBox,.selItem{background:transparent;font-family:inherit;letter-spacing:.04em}
#searchBox::placeholder{text-transform:uppercase;letter-spacing:.08em;font-size:.78rem;color:var(--muted)}
/* comment-style panel labels */
#sidebar h2::before,.lo-msg::before{content:'// '}
#sidebar h2{letter-spacing:.18em}
#wkLabel{font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:.9rem}
#calHead div{letter-spacing:.14em}
/* corner-bracket hover (signature) */
.iconbtn:hover,.navbtn:hover,#termSel:hover,.chip:not(.on):hover,.course:hover,
.selItem:hover,#exportBtns button:hover{
  --bk:linear-gradient(var(--accent),var(--accent));
  background-image:var(--bk),var(--bk),var(--bk),var(--bk),var(--bk),var(--bk),var(--bk),var(--bk);
  background-repeat:no-repeat;
  background-position:0 0,0 0,100% 0,100% 0,0 100%,0 100%,100% 100%,100% 100%;
  background-size:9px 1px,1px 9px,9px 1px,1px 9px,9px 1px,1px 9px,9px 1px,1px 9px;
}
.chip.on:hover{background-image:none}
/* status/ghost tints -> monochrome */
.block.ghost{box-shadow:0 0 0 3px rgba(255,255,255,.08), 0 6px 20px rgba(0,0,0,.35)}
.block{box-shadow:none}
.block:hover{box-shadow:0 0 0 1px var(--accent)}
#results::-webkit-scrollbar-thumb{border-radius:0}
.toast{letter-spacing:.06em}
@media(max-width:820px){
  header{flex-wrap:wrap;row-gap:8px}
  header h1{font-size:.78rem;letter-spacing:.12em}
  #termSel{flex:1;min-width:0;order:10;font-size:.72rem;padding:7px 8px}
}
</style>
</head>
<body data-view="cal">
<header>
  <div class="logo">CU</div>
  <h1>Schedule Builder</h1>
  <select id="termSel" title="Term" style="display:none"></select>
  <span class="term" id="termLabel">Loading…</span>
  <div class="spacer"></div>
  <div class="stat"><b id="stCourses">0</b><span>courses</span></div>
  <div class="stat"><b id="stCredits">0.0</b><span>credits</span></div>
  <div class="stat"><b id="stHours">0.0</b><span>hrs/wk</span></div>
  <button class="iconbtn" id="themeBtn">◐ Theme</button>
  <button class="iconbtn" id="clearBtn">Clear all</button>
</header>
<main>
  <div id="left">
    <div id="searchWrap">
      <input id="searchBox" type="text" placeholder="Search courses — e.g. CGSC 2001, psychology, Davies…" autocomplete="off">
    </div>
    <div id="filters">
      <span class="chip" data-f="open">Open only</span>
      <span class="chip" data-f="fits">Fits my schedule</span>
      <span class="chip lvl" data-l="1">1000</span>
      <span class="chip lvl" data-l="2">2000</span>
      <span class="chip lvl" data-l="3">3000</span>
      <span class="chip lvl" data-l="4">4000+</span>
    </div>
    <div class="warnbar" id="warnbar"></div>
    <div id="results"></div>
  </div>
  <div id="center">
    <div id="calNav">
      <span id="wkLabel"></span>
      <span class="spacer"></span>
      <button class="navbtn" id="wkToday">Today</button>
      <button class="navbtn" id="wkPrev">‹</button>
      <button class="navbtn" id="wkNext">›</button>
    </div>
    <div id="calWrap">
      <div id="calHead"></div>
      <div id="calBody"><div id="calGrid"></div></div>
    </div>
  </div>
  <div id="sidebar">
    <h2>Semester Build</h2>
    <div id="selList"><div class="empty">Nothing selected yet.<br>Hover a section to preview it,<br>click to add it.</div></div>
    <div id="sumBox">
      <div class="row"><span>Credits</span><b id="sumCredits">0.0</b></div>
      <div class="row"><span>Class hours / week</span><b id="sumHours">0.0</b></div>
      <div class="row"><span>Conflicts</span><b id="sumConflicts">0</b></div>
    </div>
    <div id="exportBtns">
      <button class="iconbtn" id="copyCrns">Copy CRNs</button>
      <button class="iconbtn" id="exportIcs">.ics</button>
    </div>
  </div>
</main>
<nav id="tabbar">
  <div class="tab" data-v="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20.5 20.5l-4.2-4.2"/></svg>Search</div>
  <div class="tab on" data-v="cal"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>Calendar</div>
  <div class="tab" data-v="plan"><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="3"/><path d="M8 8.5h8M8 12.5h8M8 16.5h5"/></svg>Schedule</div>
</nav>
<div class="toast" id="toast"></div>
<div id="loadOverlay"><div class="lo-box"><div class="lo-spin"></div><div class="lo-msg">Loading course data…</div></div></div>
<script>
"use strict";
let DATA = null;               // active term payload; set by loadTerm()
const DAY_MAP = {Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function parseDateRange(str){ // "Sep 09, 2026 to Dec 11, 2026" -> [Date, Date]
  const m = (str||'').match(/(\w{3}) (\d{2}), (\d{4}) to (\w{3}) (\d{2}), (\d{4})/);
  if(!m) return null;
  return [new Date(+m[3],MONTHS[m[1]],+m[2]), new Date(+m[6],MONTHS[m[4]],+m[5])];
}
function mondayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
const PALETTE = [
 ['#e0322e','#fff'],['#2563eb','#fff'],['#059669','#fff'],['#d97706','#fff'],
 ['#7c3aed','#fff'],['#db2777','#fff'],['#0891b2','#fff'],['#65a30d','#fff'],
 ['#dc2626','#fff'],['#4f46e5','#fff'],['#0d9488','#fff'],['#b45309','#fff'],
 ['#9333ea','#fff'],['#be185d','#fff'],['#0369a1','#fff'],['#4d7c0f','#fff']
];

// ---------- parse sections ----------
function parseTime(t){ // "13:05 - 14:25" -> [785, 865]
  const m = t.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return [ +m[1]*60 + +m[2], +m[3]*60 + +m[4] ];
}
let sections = [];             // all sections, enriched (term-scoped)
let byCrn = {};
let courses = {};              // code -> {code,title,credit,secs[]}
let courseList = [];
let semStart, semEnd, firstWeek, lastWeek, viewWeek;

function loadTerm(data){
  DATA = data;
  sections = []; byCrn = {}; courses = {};
  for(const s of data.sections){
    s.slots = [];
    for(const mt of s.meetings){
      const tm = parseTime(mt.time||'');
      if(!tm) continue;
      const dr = parseDateRange(mt.dates);
      for(const dstr of (mt.days||'').split(/\s+/).filter(Boolean)){
        const d = DAY_MAP[dstr];
        if(d===undefined) continue;
        s.slots.push({day:d, start:tm[0], end:tm[1], from:dr&&dr[0], to:dr&&dr[1]});
      }
    }
    s.creditN = parseFloat(s.credit)||0;
    s.level = (s.course.match(/\d/)||['0'])[0];
    byCrn[s.crn] = s;
    sections.push(s);
    if(!courses[s.course]) courses[s.course] = {code:s.course, title:s.title, credit:s.creditN, secs:[]};
    courses[s.course].secs.push(s);
    if(s.title && s.title.length > (courses[s.course].title||'').length && /Lecture|Seminar|Studio|Film/.test(s.type)) courses[s.course].title = s.title;
  }
  courseList = Object.values(courses).sort((a,b)=>a.code.localeCompare(b.code));
  // semester range
  semStart = null; semEnd = null;
  for(const s of sections) for(const sl of s.slots){
    if(sl.from && (!semStart || sl.from<semStart)) semStart = sl.from;
    if(sl.to && (!semEnd || sl.to>semEnd)) semEnd = sl.to;
  }
  if(!semStart) semStart = new Date();
  if(!semEnd) semEnd = addDays(semStart, 90);
  firstWeek = addDays(mondayOf(semStart), -7); // a week of room before classes
  lastWeek  = addDays(mondayOf(semEnd), 7);    // and after
  viewWeek = (()=>{
    const t = mondayOf(new Date());
    return (t>=firstWeek && t<=lastWeek) ? t : mondayOf(semStart);
  })();
  // reset term-scoped UI state
  selected = new Set(JSON.parse(localStorage.getItem('cuSel'+data.termCode)||'[]').filter(c=>byCrn[c]));
  ghost = null;
  colorMap = {};
  expanded = new Set();
  resetCal();
  document.getElementById('termLabel').textContent = data.term+' · scraped '+data.scraped+' · '+data.sections.length+' sections';
  document.title = 'Carleton Schedule Builder — '+data.term;
  refresh();
}
function gotoWeek(d){
  if(!DATA) return;
  const t = Math.min(Math.max(d.getTime(), firstWeek.getTime()), lastWeek.getTime());
  slideDir = t<viewWeek.getTime()? -1 : t>viewWeek.getTime()? 1 : 0;
  viewWeek = new Date(t);
  drawCal();
}

// ---------- state ----------
let selected = new Set();
let ghost = null;              // crn being hovered
let ghostTimer = null;         // hover debounce
let filters = {open:false, fits:false, lvl:new Set()};
let query = '';
let colorMap = {};             // course code -> palette idx
function colorFor(code){
  if(!(code in colorMap)){
    const used = new Set(Object.values(colorMap));
    let i=0; while(used.has(i) && i<PALETTE.length-1) i++;
    colorMap[code]=i;
  }
  return PALETTE[colorMap[code]];
}
function save(){ if(DATA) localStorage.setItem('cuSel'+DATA.termCode, JSON.stringify([...selected])); }

// ---------- conflicts ----------
function overlap(a,b){ return a.day===b.day && a.start < b.end && b.start < a.end; }
function conflictsWith(sec, set){
  const out=[];
  for(const crn of set){
    if(crn===sec.crn) continue;
    const o = byCrn[crn];
    for(const s1 of sec.slots) for(const s2 of o.slots)
      if(overlap(s1,s2)){ out.push(o.course+' '+o.section); break; }
  }
  return [...new Set(out)];
}
function selectionConflicts(){
  let n=0; const arr=[...selected];
  for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
    const a=byCrn[arr[i]], b=byCrn[arr[j]];
    outer: for(const s1 of a.slots) for(const s2 of b.slots) if(overlap(s1,s2)){ n++; break outer; }
  }
  return n;
}

// ---------- search ----------
function match(c){
  if(filters.lvl.size && !filters.lvl.has(c.code.match(/\s(\d)/)?.[1]==='4'||+c.code.match(/\s(\d)/)?.[1]>=4 ? '4' : c.code.match(/\s(\d)/)?.[1])) {}
  const lvlDigit = (c.code.match(/\s(\d)/)||[])[1];
  if(filters.lvl.size){
    const key = (+lvlDigit>=4) ? '4' : lvlDigit;
    if(!filters.lvl.has(key)) return false;
  }
  let secs = c.secs;
  if(filters.open) secs = secs.filter(s=>/open/i.test(s.status));
  if(filters.fits) secs = secs.filter(s=>conflictsWith(s,selected).length===0);
  if(!secs.length) return false;
  if(!query) return true;
  const q = query.toLowerCase().replace(/\s+/g,'');
  const hay = (c.code + c.title + c.secs.map(s=>s.instructor).join(' ')).toLowerCase().replace(/\s+/g,'');
  if(hay.includes(q)) return true;
  // multi-word: all tokens must appear
  const toks = query.toLowerCase().split(/\s+/).filter(Boolean);
  const hay2 = (c.code+' '+c.title+' '+c.secs.map(s=>s.instructor).join(' ')).toLowerCase();
  return toks.every(t=>hay2.includes(t));
}

// ---------- render results ----------
const resultsEl = document.getElementById('results');
let expanded = new Set();
function fmtSlots(s){
  if(!s.slots.length) return s.meetings.length? 'No fixed time' : 'No scheduled meetings (online/async?)';
  const byTime = {};
  for(const sl of s.slots){
    const k = sl.start+'-'+sl.end;
    (byTime[k]=byTime[k]||[]).push(DAY_NAMES[sl.day]);
  }
  return Object.entries(byTime).map(([k,ds])=>{
    const [a,b]=k.split('-').map(Number);
    return ds.join('/')+' '+fmtMin(a)+'–'+fmtMin(b);
  }).join(' · ');
}
function fmtMin(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function render(){
  const list = courseList.filter(match);
  const frag = document.createDocumentFragment();
  const cap = 120;
  list.slice(0,cap).forEach(c=>{
    const div = document.createElement('div');
    div.className = 'course'+(expanded.has(c.code)?' expanded':'');
    const anySel = c.secs.some(s=>selected.has(s.crn));
    const head = document.createElement('div');
    head.className='courseHead';
    head.innerHTML = `<span class="code" ${anySel?'style="color:var(--open)"':''}>${c.code}</span>
      <span class="title">${esc(c.title)}</span>
      <span class="n">${c.secs.length}</span><span class="caret">▶</span>`;
    head.onclick = ()=>{ expanded.has(c.code)?expanded.delete(c.code):expanded.add(c.code); render(); };
    div.appendChild(head);
    if(expanded.has(c.code)){
      const secsEl = document.createElement('div');
      secsEl.className='sections';
      let secs = c.secs;
      if(filters.open) secs = secs.filter(s=>/open/i.test(s.status));
      secs.forEach(s=>{
        const conf = conflictsWith(s, selected);
        const el = document.createElement('div');
        el.className = 'sec'+(selected.has(s.crn)?' selected':'')+(conf.length&&!selected.has(s.crn)?' conflict':'');
        const dotCls = /open/i.test(s.status)?'open':(/wait/i.test(s.status)?'wait':'closed');
        el.innerHTML = `<span class="dot ${dotCls}" title="${esc(s.status)}"></span>
          <span class="sid">${esc(s.section)}</span>
          <div class="meta">
            <div class="l1">${esc(s.type)}${s.instructor?' · '+esc(s.instructor):''}</div>
            <div class="l2">${esc(fmtSlots(s))}${s.also?' — needs: '+esc(s.also):''}</div>
          </div>
          ${conf.length&&!selected.has(s.crn)?'<span class="badge conflict">✕ '+esc(conf[0])+'</span>':''}
          <span class="addbtn">${selected.has(s.crn)?'✓ Added':'+ Add'}</span>`;
        el.onmouseenter = ()=>{
          clearTimeout(ghostTimer);
          ghostTimer = setTimeout(()=>{ ghost = s.crn; drawCal(); }, 40);
        };
        el.onmouseleave = ()=>{
          clearTimeout(ghostTimer);
          if(ghost){ ghost = null; drawCal(); }
        };
        el.onclick = (e)=>{ e.stopPropagation(); toggle(s); };
        el.title = s.info || '';
        secsEl.appendChild(el);
      });
      if(!secs.length) secsEl.innerHTML = '<div class="empty" style="padding:14px">No sections match filters</div>';
      div.appendChild(secsEl);
    }
    frag.appendChild(div);
  });
  resultsEl.innerHTML='';
  if(!list.length){
    resultsEl.innerHTML = '<div class="empty">No courses found.<br>Try a subject code like <b>CGSC</b>, <b>PSYC</b>, <b>COMP</b>…</div>';
  } else {
    resultsEl.appendChild(frag);
    if(list.length>cap){
      const more = document.createElement('div');
      more.className='empty';
      more.textContent = (list.length-cap)+' more — refine your search';
      resultsEl.appendChild(more);
    }
  }
}
function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// ---------- toggle selection ----------
function toggle(s){
  if(selected.has(s.crn)){ selected.delete(s.crn); toast('Removed '+s.course+' '+s.section); }
  else {
    const conf = conflictsWith(s, selected);
    selected.add(s.crn);
    if(conf.length) toast('⚠ Added with conflict: '+conf.join(', '));
    else toast('Added '+s.course+' '+s.section+(s.also?' — also register: '+s.also:''));
  }
  save(); ghost=null; refresh();
}

// ---------- calendar ----------
const calHead = document.getElementById('calHead');
const calGrid = document.getElementById('calGrid');
const calBody = document.getElementById('calBody');
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)');
let slideDir = 0;              // -1 prev / +1 next; consumed by next drawCal
let blockEls = new Map();      // "crn|day|start" -> element (survives redraws)
let staticLayer = null;        // grid columns + hour lines (rebuilt freely)
let blockLayer = null;         // holds blocks; never rebuilt, so blocks can glide
let noWeekEl = null, nowLineEl = null;
let staticKey = '';            // signature of the static grid parts
let calGeom = null;            // last {minH,maxH,PPM,nDays,wk} for the now-line

function resetCal(){           // full reset (term switch)
  blockEls.clear();
  noWeekEl = null; nowLineEl = null;
  staticKey = ''; calGeom = null; slideDir = 0;
  calGrid.innerHTML = '';
  staticLayer = document.createElement('div'); staticLayer.id = 'staticLayer';
  blockLayer  = document.createElement('div'); blockLayer.id = 'blockLayer';
  calGrid.append(staticLayer, blockLayer);
}
function activeSlots(){
  const out=[];
  for(const crn of selected){ const s=byCrn[crn]; for(const sl of s.slots) out.push({...sl, sec:s, ghost:false}); }
  if(ghost && !selected.has(ghost)){ const s=byCrn[ghost]; for(const sl of s.slots) out.push({...sl, sec:s, ghost:true}); }
  return out;
}
function buildStatic(g){
  staticLayer.innerHTML = '';
  staticLayer.style.gridTemplateColumns = `46px repeat(${g.nDays},1fr)`;
  const gutter = document.createElement('div');
  gutter.style.position='relative';
  for(let h=g.minH+60; h<g.maxH; h+=60){
    const lbl = document.createElement('div');
    lbl.className='hlabel'; lbl.style.top=((h-g.minH)*g.PPM)+'px';
    lbl.textContent = fmtMin(h);
    gutter.appendChild(lbl);
  }
  staticLayer.appendChild(gutter);
  for(let d=0; d<g.nDays; d++){
    const col = document.createElement('div');
    col.className='gcol';
    for(let h=g.minH+60; h<g.maxH; h+=60){
      const ln=document.createElement('div'); ln.className='hline'; ln.style.top=((h-g.minH)*g.PPM)+'px';
      col.appendChild(ln);
    }
    staticLayer.appendChild(col);
  }
}
function blockGeom(sl, lane, lanes, g){
  // horizontal: 46px gutter, then nDays equal columns inside the layer
  const colFrac = (sl.day + lane/lanes)/g.nDays, wFrac = 1/(lanes*g.nDays);
  return {
    top: (sl.start-g.minH)*g.PPM,
    height: Math.max(20,(sl.end-sl.start)*g.PPM-2),
    left: `calc(46px + (100% - 46px)*${colFrac} + 3px)`,
    width: `calc((100% - 46px)*${wFrac} - 6px)`
  };
}
function slideOutOldWeek(dir){
  if(REDUCED.matches) return;
  const clone = calGrid.cloneNode(true);
  clone.removeAttribute('id');
  clone.classList.add('calOut', dir>0?'calOutL':'calOutR');
  clone.style.top = (-calBody.scrollTop)+'px';
  clone.style.height = calGrid.style.height;
  clone.style.display = getComputedStyle(calGrid).display;
  calBody.appendChild(clone);
  const gone = ()=>clone.remove();
  clone.addEventListener('animationend', gone, {once:true});
  setTimeout(gone, 400);
}
function drawCal(){
  if(!DATA) return;
  const slots = activeSlots();
  const wk = [...Array(7)].map((_,i)=>addDays(viewWeek,i));
  const onDate = sl => !sl.from || (wk[sl.day] >= sl.from && wk[sl.day] <= sl.to);
  const wkSlots = slots.filter(onDate);
  const needSat = wkSlots.some(s=>s.day===5), needSun = wkSlots.some(s=>s.day===6);
  const nDays = 5 + (needSat?1:0) + (needSun?1:0);
  let minH = 8*60, maxH = 18*60;
  for(const s of wkSlots){ minH = Math.min(minH, Math.floor(s.start/60)*60); maxH = Math.max(maxH, Math.ceil(s.end/60)*60); }
  const span = maxH - minH;
  const PPM = Math.max(1.05, (calBody.clientHeight-10) / span); // px per minute; overflow scrolls
  const g = {minH, maxH, PPM, nDays, wk};
  calGeom = g;
  const today = new Date(); today.setHours(0,0,0,0);
  calHead.style.gridTemplateColumns = `46px repeat(${nDays},1fr)`;
  calHead.innerHTML = '<div></div>' + wk.slice(0,nDays).map((dt,i)=>
    `<div${dt.getTime()===today.getTime()?' class="today"':''}>${DAY_NAMES[i]}<small>${MONTH_NAMES[dt.getMonth()]} ${dt.getDate()}</small></div>`).join('');
  const lastD = wk[nDays-1];
  const wkLabel = document.getElementById('wkLabel');
  const labelHTML =
    MONTH_NAMES[wk[0].getMonth()]+' '+wk[0].getDate()+' – '+MONTH_NAMES[lastD.getMonth()]+' '+lastD.getDate()+' <small>'+wk[0].getFullYear()+'</small>';
  if(wkLabel.innerHTML !== labelHTML){
    wkLabel.innerHTML = labelHTML;
    if(!REDUCED.matches) wkLabel.animate([{opacity:.15},{opacity:1}], {duration:220, easing:'ease-out'});
  }
  document.getElementById('wkPrev').disabled = viewWeek.getTime() <= firstWeek.getTime();
  document.getElementById('wkNext').disabled = viewWeek.getTime() >= lastWeek.getTime();
  // rebuild static parts only when geometry changes; slide on week change
  const key = viewWeek.getTime()+'|'+nDays+'|'+minH+'|'+maxH+'|'+PPM.toFixed(3);
  const weekChanged = staticKey && staticKey.split('|')[0] !== String(viewWeek.getTime());
  if(key !== staticKey){
    if(weekChanged && slideDir){
      slideOutOldWeek(slideDir);
      blockEls.clear();
      blockLayer.querySelectorAll('.block').forEach(b=>b.remove());
      calGrid.classList.remove('slideL','slideR');
      void calGrid.offsetWidth;
      if(!REDUCED.matches) calGrid.classList.add(slideDir>0?'slideL':'slideR');
    }
    buildStatic(g);
    staticKey = key;
  }
  slideDir = 0;
  calGrid.style.height = (span*PPM)+'px';
  // ----- diff blocks against wanted slots -----
  const selSlots = wkSlots.filter(s=>!s.ghost);
  const want = new Map();
  for(let d=0; d<nDays; d++){
    const daySlots = wkSlots.filter(s=>s.day===d).sort((a,b)=>a.start-b.start);
    for(const sl of daySlots){
      const overl = daySlots.filter(o=>o!==sl && overlap(o,sl));
      const idx = daySlots.indexOf(sl);
      const lane = overl.filter(o=>daySlots.indexOf(o)<idx).length;
      const lanes = overl.length? Math.max(2, overl.length+1) : 1;
      want.set(sl.sec.crn+'|'+sl.day+'|'+sl.start, {sl, lane, lanes});
    }
  }
  for(const [k, el] of blockEls){
    if(want.has(k)) continue;
    blockEls.delete(k);
    el.classList.add('leaving');
    el.style.pointerEvents = 'none';
    const gone = ()=>el.remove();
    if(REDUCED.matches) gone();
    else { el.addEventListener('transitionend', gone, {once:true}); setTimeout(gone, 350); }
  }
  for(const [k, {sl, lane, lanes}] of want){
    let el = blockEls.get(k);
    const geo = blockGeom(sl, lane, lanes, g);
    const [bg,fg] = colorFor(sl.sec.course);
    const isConf = sl.ghost && selSlots.some(o=>o!==sl && overlap(o,sl));
    const fresh = !el;
    if(fresh){
      el = document.createElement('div');
      el.className = 'block entering';
      blockLayer.appendChild(el);
      blockEls.set(k, el);
    }
    el.classList.toggle('ghost', !!sl.ghost);
    el.classList.toggle('ghostConflict', isConf);
    el.classList.toggle('tiny', geo.height < 28);
    el.style.top = geo.top+'px';
    el.style.height = geo.height+'px';
    el.style.left = geo.left;
    el.style.width = geo.width;
    el.style.zIndex = lanes>1 ? 10+lane : '';
    el.style.background = sl.ghost? 'transparent' : bg;
    el.style.borderColor = bg;
    el.style.color = sl.ghost? 'var(--text)' : fg;
    el.innerHTML = `<b>${esc(sl.sec.course)} ${esc(sl.sec.section)}</b><span class="bt">${esc(sl.sec.type)}<br>${fmtMin(sl.start)}–${fmtMin(sl.end)}</span>${sl.ghost?'':'<span class="x">✕</span>'}`;
    el.title = sl.sec.title+' — '+sl.sec.instructor+(isConf?'  (CONFLICTS)':'');
    el.onclick = sl.ghost? null : ()=>toggle(sl.sec);
    if(fresh){
      if(REDUCED.matches) el.classList.remove('entering');
      else requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.remove('entering')));
    }
  }
  if(!wkSlots.length){
    if(!noWeekEl){
      noWeekEl = document.createElement('div');
      noWeekEl.className = 'noWeek';
      calGrid.appendChild(noWeekEl);
    }
    noWeekEl.textContent = selected.size ? 'No classes this week' : 'Add courses to see your week';
  } else if(noWeekEl){
    noWeekEl.remove(); noWeekEl = null;
  }
  positionNowLine();
}
function positionNowLine(){
  if(!calGeom || !blockLayer) return;
  const g = calGeom;
  const now = new Date();
  const today = new Date(); today.setHours(0,0,0,0);
  let dayIdx = -1;
  for(let i=0; i<g.nDays; i++) if(g.wk[i].getTime()===today.getTime()) dayIdx = i;
  const mins = now.getHours()*60 + now.getMinutes();
  const show = dayIdx>=0 && mins>=g.minH && mins<=g.maxH;
  if(!nowLineEl){
    nowLineEl = document.createElement('div');
    nowLineEl.className = 'nowline';
    nowLineEl.innerHTML = '<span></span>';
  }
  if(nowLineEl.parentNode !== blockLayer) blockLayer.appendChild(nowLineEl);
  nowLineEl.style.display = show? '' : 'none';
  if(show){
    nowLineEl.style.top = ((mins-g.minH)*g.PPM)+'px';
    nowLineEl.style.left = `calc(46px + (100% - 46px)*${dayIdx/g.nDays})`;
    nowLineEl.style.width = `calc((100% - 46px)*${1/g.nDays})`;
  }
}
setInterval(positionNowLine, 60000);

// ---------- sidebar ----------
function drawSidebar(){
  const listEl = document.getElementById('selList');
  if(!selected.size){
    listEl.innerHTML = '<div class="empty">Nothing selected yet.<br>Hover a section to preview it,<br>click to add it.</div>';
  } else {
    listEl.innerHTML='';
    const byCourse = {};
    for(const crn of selected){ const s=byCrn[crn]; (byCourse[s.course]=byCourse[s.course]||[]).push(s); }
    Object.keys(byCourse).sort().forEach(code=>{
      byCourse[code].forEach(s=>{
        const [bg] = colorFor(code);
        const div = document.createElement('div');
        div.className='selItem'; div.style.borderLeftColor = bg;
        div.innerHTML = `<div class="c">${esc(s.course)} ${esc(s.section)} <span style="font-weight:400;color:var(--muted)">· ${esc(s.type)}</span></div>
          <div class="t">${esc(s.title)}${s.instructor?' — '+esc(s.instructor):''}</div>
          <div class="m">${esc(fmtSlots(s))}</div>
          <div class="crn">CRN ${esc(s.crn)} · ${s.creditN} cr · ${esc(s.status)}</div>
          <span class="rm" title="Remove">✕</span>`;
        div.querySelector('.rm').onclick = ()=>toggle(s);
        listEl.appendChild(div);
      });
    });
  }
  // stats: count credits once per lecture-ish section (labs are usually 0cr, data has per-section credit)
  let credits=0, mins=0;
  for(const crn of selected){ const s=byCrn[crn]; credits+=s.creditN; for(const sl of s.slots) mins += sl.end-sl.start; }
  const nCourses = new Set([...selected].map(c=>byCrn[c].course)).size;
  const conf = selectionConflicts();
  document.getElementById('stCourses').textContent = nCourses;
  document.getElementById('stCredits').textContent = credits.toFixed(1);
  document.getElementById('stHours').textContent = (mins/60).toFixed(1);
  document.getElementById('sumCredits').textContent = credits.toFixed(1);
  document.getElementById('sumHours').textContent = (mins/60).toFixed(1);
  const sc = document.getElementById('sumConflicts');
  sc.textContent = conf; sc.style.color = conf? 'var(--closed)':'var(--open)';
  const warn = document.getElementById('warnbar');
  const missing = [...selected].map(c=>byCrn[c]).filter(s=>s.also && !hasLinked(s));
  if(missing.length){
    warn.style.display='block';
    warn.textContent = '⚠ '+missing.map(s=>s.course+' '+s.section+' needs: '+s.also).join('  •  ');
  } else warn.style.display='none';
}
function hasLinked(s){
  // check if any selected section of same course, different type, is selected
  const opts = (s.also.match(/[A-Z]{2,4}\s?\d{4}\s([A-Z]?\d+|[A-Z]\d*)/g)||[]);
  return [...selected].some(crn=>{
    const o=byCrn[crn];
    return o.course===s.course && o.crn!==s.crn;
  });
}

// ---------- toolbar ----------
document.getElementById('searchBox').addEventListener('input', e=>{
  query = e.target.value.trim();
  if(query.length>=2){
    // auto-expand exact course-code matches
    const q = query.toUpperCase().replace(/\s+/g,'');
    courseList.forEach(c=>{ if(c.code.replace(/\s+/g,'')===q) expanded.add(c.code); });
    const matches = courseList.filter(match);
    if(matches.length<=4) matches.forEach(c=>expanded.add(c.code));
  }
  render();
});
document.querySelectorAll('.chip').forEach(ch=>{
  ch.onclick = ()=>{
    ch.classList.toggle('on');
    if(ch.dataset.f) filters[ch.dataset.f] = ch.classList.contains('on');
    if(ch.dataset.l){
      ch.classList.contains('on') ? filters.lvl.add(ch.dataset.l) : filters.lvl.delete(ch.dataset.l);
    }
    render();
  };
});
document.getElementById('clearBtn').onclick = ()=>{
  if(!selected.size) return;
  selected.clear(); save(); refresh(); toast('Cleared schedule');
};
document.getElementById('themeBtn').onclick = ()=>{
  const b = document.documentElement;
  b.dataset.theme = b.dataset.theme==='light' ? '' : 'light';
  localStorage.setItem('cuTheme', b.dataset.theme);
};
if(localStorage.getItem('cuTheme')==='light') document.documentElement.dataset.theme='light';
document.getElementById('copyCrns').onclick = ()=>{
  if(!selected.size) return toast('Nothing selected');
  navigator.clipboard.writeText([...selected].join(', '));
  toast('CRNs copied: '+[...selected].join(', '));
};
document.getElementById('exportIcs').onclick = ()=>{
  if(!selected.size) return toast('Nothing selected');
  const DOW = ['MO','TU','WE','TH','FR','SA','SU'];
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CU Schedule Builder//EN\r\n';
  for(const crn of selected){
    const s = byCrn[crn];
    const dm = (s.meetings[0]?.dates||'').match(/(\w{3}) (\d{2}), (\d{4}) to (\w{3}) (\d{2}), (\d{4})/);
    if(!dm || !s.slots.length) continue;
    const start = new Date(+dm[3], MONTHS[dm[1]], +dm[2]);
    const until = `${dm[6]}${String(MONTHS[dm[4]]+1).padStart(2,'0')}${dm[5]}T235959`;
    for(const sl of s.slots){
      // first occurrence of weekday sl.day on/after start (Mon=0)
      const d = new Date(start);
      const want = (sl.day+1)%7; // JS: Sun=0
      while(d.getDay()!==want) d.setDate(d.getDate()+1);
      const ymd = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
      const t1 = 'T'+fmtMin(sl.start).replace(':','')+'00', t2='T'+fmtMin(sl.end).replace(':','')+'00';
      ics += 'BEGIN:VEVENT\r\n';
      ics += `UID:${s.crn}-${sl.day}-${sl.start}@cusb\r\n`;
      ics += `DTSTART;TZID=America/Toronto:${ymd}${t1}\r\nDTEND;TZID=America/Toronto:${ymd}${t2}\r\n`;
      ics += `RRULE:FREQ=WEEKLY;BYDAY=${DOW[sl.day]};UNTIL=${until}\r\n`;
      ics += `SUMMARY:${s.course} ${s.section} (${s.type})\r\nDESCRIPTION:${s.title.replace(/,/g,'\\,')} — ${s.instructor} — CRN ${s.crn}\r\n`;
      ics += 'END:VEVENT\r\n';
    }
  }
  ics += 'END:VCALENDAR\r\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
  a.download = 'carleton-'+(DATA?DATA.termCode:'schedule')+'.ics';
  a.click();
  toast('.ics downloaded');
};

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
// ---------- week nav ----------
document.getElementById('wkPrev').onclick = ()=>gotoWeek(addDays(viewWeek,-7));
document.getElementById('wkNext').onclick = ()=>gotoWeek(addDays(viewWeek,7));
document.getElementById('wkToday').onclick = ()=>{
  const t = mondayOf(new Date());
  gotoWeek((t>=firstWeek && t<=lastWeek) ? t : mondayOf(semStart));
};
let swX=null, swY=null;
calBody.addEventListener('touchstart', e=>{ swX=e.touches[0].clientX; swY=e.touches[0].clientY; }, {passive:true});
calBody.addEventListener('touchend', e=>{
  if(swX===null) return;
  const dx = e.changedTouches[0].clientX-swX, dy = e.changedTouches[0].clientY-swY;
  if(Math.abs(dx)>60 && Math.abs(dy)<50) gotoWeek(addDays(viewWeek, dx<0?7:-7));
  swX=null;
}, {passive:true});

// ---------- mobile tabs ----------
const tabEls = document.querySelectorAll('#tabbar .tab');
tabEls.forEach(t=>t.onclick = ()=>{
  document.body.dataset.view = t.dataset.v;
  tabEls.forEach(x=>x.classList.toggle('on', x.dataset.v===t.dataset.v));
  if(t.dataset.v!=='search') document.getElementById('searchBox').blur();
  drawCal();
});

function refresh(){ if(!DATA) return; render(); drawCal(); drawSidebar(); }
window.addEventListener('resize', drawCal);
// arrow keys switch weeks (not while typing in a field)
window.addEventListener('keydown', e=>{
  if(e.target.matches('input,select,textarea')) return;
  if(e.key==='ArrowLeft') gotoWeek(addDays(viewWeek,-7));
  else if(e.key==='ArrowRight') gotoWeek(addDays(viewWeek,7));
});

// ---------- data bootstrap ----------
const overlay = document.getElementById('loadOverlay');
const termSel = document.getElementById('termSel');
function showOverlay(msg, isErr){
  overlay.querySelector('.lo-msg').innerHTML = msg;
  overlay.querySelector('.lo-spin').style.display = isErr? 'none' : '';
  overlay.classList.remove('hide');
}
function hideOverlay(){ overlay.classList.add('hide'); }
async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-cache'});
  if(!r.ok) throw new Error('HTTP '+r.status+' on '+url);
  return r.json();
}
async function switchTerm(code){
  showOverlay('Loading course data…');
  try{
    const data = await fetchJSON('data/courses-'+code+'.json');
    localStorage.setItem('cuTerm', code);
    loadTerm(data);
    hideOverlay();
  }catch(e){
    showOverlay('Could not load course data ('+esc(e.message)+').<br>Check your connection and refresh to retry.', true);
  }
}
(async function boot(){
  // migrate the pre-term-picker saved schedule (Fall 2026)
  if(localStorage.getItem('cuSel2026F') && !localStorage.getItem('cuSel202630'))
    localStorage.setItem('cuSel202630', localStorage.getItem('cuSel2026F'));
  try{
    const idx = await fetchJSON('data/terms.json');
    const terms = idx.terms || [];
    if(!terms.length) throw new Error('no terms listed');
    const saved = localStorage.getItem('cuTerm');
    const code = terms.some(t=>t.code===saved)? saved
               : terms.some(t=>t.code==='202630')? '202630' : terms[0].code;
    termSel.innerHTML = terms.map(t=>`<option value="${esc(t.code)}">${esc(t.name)}</option>`).join('');
    termSel.value = code;
    termSel.style.display = '';
    termSel.onchange = ()=>switchTerm(termSel.value);
    await switchTerm(code);
  }catch(e){
    showOverlay('Could not load course data ('+esc(e.message)+').<br>If you opened this file directly from disk, serve it over http instead: <code>python3 -m http.server</code>', true);
  }
})();
</script>
